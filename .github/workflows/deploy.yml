script: |
  cd Ec2cicd

  echo "Pull latest code"
  git pull origin main

  echo "Clean old build"
  rm -rf dist

  echo "Install dependencies"
  npm install

  echo "Build Angular app"
  npm run build -- --configuration production

  echo "Install serve (if not installed)"
  npm install -g serve

  echo "Restart PM2"
  pm2 delete angular-app || true
  pm2 start "serve -s dist/ec2-cicd-app/browser -l 3000" --name angular-app

  pm2 save