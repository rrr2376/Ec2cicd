name: Deploy Angular to EC2 (Nginx)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24

      # 3. Install deps
      - name: Install dependencies
        run: npm install

      # 4. Build Angular
      - name: Build Angular
        run: npm run build -- --configuration production

      # 5. Verify build
      - name: Check build
        run: ls -R dist

      # 6. Copy build DIRECTLY to nginx folder (IMPORTANT FIX)
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/ec2-cicd-app/browser/*"
          target: "/var/www/angular-app"

      # 7. Fix permissions + restart nginx
      - name: Restart Nginx
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/angular-app
            sudo systemctl restart nginx